<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toothless AI Health Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-container">
        <header>
            <h1>🐉 Toothless</h1>
            <p>Your Personal AI Health Companion</p>
        </header>

        <main class="glass-card chat-card">
            <section class="chat-section">
                <div class="chat-container" id="chat-container">
                    <div class="message system-message">
                        <div class="message-content">Hi there! I'm Toothless, your AI health companion. How can I help you today?</div>
                    </div>
                </div>
                
                <form id="chat-form" class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="Type your symptoms or message here..." autocomplete="off" required>
                    <button type="submit" id="send-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </form>
                <p class="disclaimer">⚠️ Disclaimer: This is an AI assistant, not a doctor. This is not medical advice. If you are experiencing a medical emergency, please call emergency services immediately.</p>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
